<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne — Pierre Touzet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 2rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fafafa;
    }
    .subtitle {
      font-size: 1.25rem;
      font-weight: 600;
      color: #a1a1aa;
      margin-bottom: 1.5rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #a1a1aa;
      max-width: 420px;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #4f46e5;
      color: #ffffff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background-color 0.2s ease;
    }
    a:hover, a:focus {
      background-color: #4338ca;
      outline: none;
    }
    a:focus-visible {
      outline: 2px solid #4f46e5;
      outline-offset: 2px;
    }
    .divider {
      width: 48px;
      height: 2px;
      background-color: #4f46e5;
      margin: 1.5rem auto;
      opacity: 0.5;
    }
    .lang-switch {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #71717a;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>

  <h1>Vous etes hors ligne</h1>
  <p>
    Votre connexion internet semble indisponible.
    Verifiez votre connexion et reessayez.
  </p>
  <a href="/fr/">Retour a l'accueil</a>

  <div class="divider"></div>

  <h1 class="subtitle" lang="en">You're offline</h1>
  <p lang="en">
    Your internet connection appears to be unavailable.
    Please check your connection and try again.
  </p>
  <a href="/en/" lang="en">Back to homepage</a>
</body>
</html>
